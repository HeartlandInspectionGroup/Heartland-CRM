<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Your Inspection | Heartland Home Inspections</title>
    <meta name="description" content="Schedule your home inspection with Heartland Home Inspections. Book online for Roscoe, IL and surrounding areas.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div id="site-header"></div>
    <script src="shared/header.js" data-base=""></script>

    <main style="max-width: 1000px; margin: 40px auto; padding: 0 16px; overflow-x: hidden;">
        <section style="background: var(--white); border-radius: 16px; padding: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.05);">
            <h1 style="font-family: 'Crimson Pro', serif; margin: 0 0 10px; color: var(--primary);">Finalize Your Inspection</h1>
            <p style="margin: 0 0 16px; color: var(--text-light);">Confirm your inspection details in our secure scheduler below.</p>

            <div id="selectedSlotBanner"
                 style="display: none; margin: 18px 0; padding: 14px 16px; border-radius: 12px; background: rgba(21,81,109,0.06); border-left: 4px solid var(--secondary);">
            </div>

            <iframe
                src="https://app.spectora.com/home-inspectors/my-inspection-company-eeda6c5d9d/schedule?iframe=1"
                style="border: 0; width: 100%; height: 1100px; border-radius: 12px; overflow: hidden;"
                loading="lazy"
                title="Schedule Your Home Inspection">
            </iframe>
        </section>
    </main>

    <script>
        // Read query params and show a friendly banner
        (function () {
            var params = new URLSearchParams(window.location.search);
            var date = params.get('date');
            var start = params.get('start');
            var end = params.get('end');

            if (!date || !start || !end) return;

            var banner = document.getElementById('selectedSlotBanner');
            if (!banner) return;

            var tz = 'America/Chicago';
            var startDt = new Date(date + 'T' + start + ':00');
            var endDt = new Date(date + 'T' + end + ':00');

            var dateFmt = new Intl.DateTimeFormat('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: tz
            });
            var timeFmt = new Intl.DateTimeFormat('en-US', {
                hour: 'numeric', minute: '2-digit', timeZone: tz
            });

            banner.style.display = 'block';
            banner.innerHTML =
                '<strong style="color: var(--primary);">You selected:</strong> ' +
                dateFmt.format(startDt) + ' — ' + timeFmt.format(startDt) + ' to ' + timeFmt.format(endDt) +
                '<div style="margin-top: 6px; color: var(--text-light); font-size: 13px;">' +
                'After selecting your services and entering your address, please confirm your preferred time below.' +
                '<br>Any applicable discounts will be applied after your appointment is confirmed and before billing.' +
                '</div>';
        })();
    </script>

    <div id="site-footer"></div>
    <script src="shared/footer.js" data-base=""></script>
</body>
</html>
