<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/brand.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Submitted — Heartland Inspection Group</title>
    <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Barlow', -apple-system, sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 16px;
        overflow-x: hidden;
    }

    /* Background decoration */
    body::before {
        content: '';
        position: fixed;
        top: -100px; right: -100px;
        width: 400px; height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(39,174,96,0.07) 0%, transparent 70%);
        pointer-events: none;
    }
    body::after {
        content: '';
        position: fixed;
        bottom: -120px; left: -80px;
        width: 350px; height: 350px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(26,42,68,0.06) 0%, transparent 70%);
        pointer-events: none;
    }

    .card {
        background: white;
        border-radius: 16px;
        max-width: 440px;
        width: 100%;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(26,42,68,0.12);
        position: relative;
        z-index: 1;
        animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* Card header - matches app header style */
    .card-header {
        background: linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 60%, #1e3a5f 100%);
        padding: 30px 24px 24px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    .card-header::before {
        content: '';
        position: absolute;
        top: -40px; right: -40px;
        width: 160px; height: 160px;
        border-radius: 50%;
        background: rgba(39,174,96,0.08);
    }
    .card-header::after {
        content: '';
        position: absolute;
        bottom: -60px; left: -20px;
        width: 180px; height: 180px;
        border-radius: 50%;
        background: rgba(255,255,255,0.03);
    }
    .logo {
        width: 160px;
        max-width: 70%;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }

    /* Card body */
    .card-body {
        padding: 36px 28px 32px;
        text-align: center;
    }

    /* Animated check */
    .check-wrap {
        margin: 0 auto 24px;
        width: 72px; height: 72px;
        position: relative;
    }
    .check-ring {
        width: 72px; height: 72px;
        border-radius: 50%;
        background: var(--green-light);
        border: 3px solid var(--green);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pop 0.4s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes pop {
        from { opacity: 0; transform: scale(0.5); }
        to   { opacity: 1; transform: scale(1); }
    }
    .check-icon {
        font-size: 34px;
        line-height: 1;
        animation: fadein 0.3s 0.5s ease both;
    }
    @keyframes fadein {
        from { opacity: 0; }
        to   { opacity: 1; }
    }

    .success-tag {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--green);
        margin-bottom: 8px;
        animation: fadein 0.4s 0.6s ease both;
    }

    h2 {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 1px;
        color: var(--navy);
        margin-bottom: 12px;
        animation: fadein 0.4s 0.65s ease both;
    }

    .message {
        font-size: 15px;
        font-weight: 400;
        color: #5a6a7d;
        line-height: 1.65;
        margin-bottom: 28px;
        animation: fadein 0.4s 0.7s ease both;
    }

    /* Divider */
    .divider {
        height: 1px;
        background: linear-gradient(to right, transparent, #e0e5ea, transparent);
        margin: 0 0 24px;
        animation: fadein 0.4s 0.7s ease both;
    }

    /* Stats row */
    .stats {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 28px;
        animation: fadein 0.4s 0.75s ease both;
    }
    .stat {
        background: #f7f9fb;
        border: 1px solid #e8ecf0;
        border-radius: 10px;
        padding: 12px 8px;
    }
    .stat-icon { font-size: 20px; margin-bottom: 4px; }
    .stat-label {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #8a9ab0;
    }
    .stat-value {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--navy);
        margin-top: 2px;
    }

    /* Button */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 16px 20px;
        background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        box-shadow: 0 4px 16px rgba(39,174,96,0.35);
        transition: transform 0.15s, box-shadow 0.15s;
        animation: fadein 0.4s 0.85s ease both;
    }
    .btn:active {
        transform: translateY(1px);
        box-shadow: 0 2px 8px rgba(39,174,96,0.25);
    }

    .card-footer {
        background: var(--navy);
        padding: 12px 20px;
        text-align: center;
    }
    .footer-text {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
    }
    /* Copy link button */
    .copy-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 14px 20px;
        background: white;
        color: var(--navy);
        border: 2px solid #e0e5ea;
        border-radius: 10px;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
        margin-bottom: 10px;
        animation: fadein 0.4s 0.8s ease both;
    }
    .copy-btn:hover { background: #f7f9fb; border-color: #c8d0da; }
    .copy-btn.copied { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .copy-btn-invoice { border-color: #f0c050; color: #b7770d; }
    .copy-btn-invoice:hover { background: #fff8e1; }
    .copy-btn-report { border-color: #b3d4f5; color: #1a6db5; }
    .copy-btn-report:hover { background: #eaf3fc; }
    .copy-btn-invoice:hover { background: #fff8e1; }
    @media (max-width: 420px) {
        .stats { grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .stat { padding: 10px 4px; }
        .stat-label { font-size: 8px; letter-spacing: 0.5px; }
        .stat-value { font-size: 11px; }
        .stat-icon { font-size: 16px; }
        .card { padding: 28px 16px 32px; }
    }
    </style>
</head>
<body>

<div class="card">

    <div class="card-header">
        <img src="https://i.imgur.com/I1vTiVT.png" alt="Heartland Inspection Group" class="logo">
    </div>

    <div class="card-body">

        <div class="check-wrap">
            <div class="check-ring">
                <span class="check-icon">✅</span>
            </div>
        </div>

        <div class="success-tag">Submission Complete</div>
        <h2>Report Delivered</h2>
        <p class="message">Property data and compressed photos have been uploaded to the Heartland system and routed for delivery.</p>

        <div class="divider"></div>

        <div class="stats">
            <div class="stat">
                <div class="stat-icon">📋</div>
                <div class="stat-label">Status</div>
                <div class="stat-value">Received</div>
            </div>
            <div class="stat">
                <div class="stat-icon">📸</div>
                <div class="stat-label">Photos</div>
                <div class="stat-value">Compressed</div>
            </div>
            <div class="stat">
                <div class="stat-icon">📨</div>
                <div class="stat-label">Report</div>
                <div class="stat-value">In Queue</div>
            </div>
        </div>

        <button class="copy-btn" id="copyLinkBtn" style="display:none;" onclick="copyReportLink()">
            🔗 Copy Report Link
        </button>

        <button class="copy-btn copy-btn-invoice" id="copyInvoiceBtn" style="display:none;" onclick="copyInvoiceLink()">
            🧾 Copy Invoice Link
        </button>

        <a class="copy-btn copy-btn-report" id="reportBtn" href="#" style="display:none;text-decoration:none;margin-bottom:10px;">
            📋 View Report
        </a>

        <a class="copy-btn" id="invoiceBtn" href="#" style="display:none;text-decoration:none;margin-bottom:10px;">
            🧾 View Invoice
        </a>

        <a href="/" class="btn">
            ＋ Start New Inspection
        </a>

    </div>

    <div class="card-footer">
        <div class="footer-text">Heartland Inspection Group · Field Tool</div>
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const reportId = params.get('id');
if (reportId) {
    document.getElementById('copyLinkBtn').style.display = 'inline-flex';
    document.getElementById('copyInvoiceBtn').style.display = 'inline-flex';
    const rptBtn = document.getElementById('reportBtn');
    rptBtn.href = `/report.html?id=${reportId}`;
    rptBtn.style.display = 'inline-flex';
    const invBtn = document.getElementById('invoiceBtn');
    invBtn.href = `/invoice-receipt.html?id=${reportId}`;
    invBtn.style.display = 'inline-flex';
}

function copyInvoiceLink() {
    const url = `${window.location.origin}/invoice-receipt.html?id=${reportId}`;
    navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyInvoiceBtn');
        btn.textContent = '✓ Invoice Link Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.innerHTML = '🧾 Copy Invoice Link';
            btn.classList.remove('copied');
        }, 2500);
    }).catch(() => {
        prompt('Copy this link:', `${window.location.origin}/invoice-receipt.html?id=${reportId}`);
    });
}

function copyReportLink() {
    const url = `${window.location.origin}/report.html?id=${reportId}`;
    navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyLinkBtn');
        btn.textContent = '✓ Link Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.innerHTML = '🔗 Copy Report Link';
            btn.classList.remove('copied');
        }, 2500);
    }).catch(() => {
        prompt('Copy this link:', `${window.location.origin}/report.html?id=${reportId}`);
    });
}
</script>
