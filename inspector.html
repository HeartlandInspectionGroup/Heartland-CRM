<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#15516d">
<title>Inspector — Heartland Inspection Group</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/images/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ DESIGN TOKENS ═══ */
:root {
  --iw-primary: #15516d;
  --iw-primary-dark: #0e3a4f;
  --iw-primary-light: #1d6d8e;
  --iw-accent: #f59321;
  --iw-accent-dark: #e07d0a;
  --iw-bg: #f5f7f8;
  --iw-card: #FFFFFF;
  --iw-text: #1a2530;
  --iw-text-light: #6b7d8a;
  --iw-border: #eaeef0;
  --iw-success: #3d7a3c;
  --iw-error: #C0392B;
  --iw-warning: #f59321;
  --iw-white: #FFFFFF;
  --iw-radius: 14px;
  --iw-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

/* ═══ DARK MODE ═══ */
body.dark-mode {
  --iw-bg: #0f1923;
  --iw-card: #1a2a38;
  --iw-text: #e4e8ec;
  --iw-text-light: #8b9daa;
  --iw-border: #2a3a48;
  --iw-shadow: 0 2px 12px rgba(0,0,0,0.3);
}

/* ═══ RESET ═══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Work Sans', sans-serif;
  background: var(--iw-bg);
  color: var(--iw-text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}
h1, h2, h3, h4 { font-family: 'Crimson Pro', serif; }
a { color: var(--iw-primary); }

/* ═══ LOGIN SCREEN ═══ */
.iw-login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
  background: linear-gradient(135deg, var(--iw-primary-dark) 0%, var(--iw-primary) 50%, var(--iw-primary-light) 100%);
}
.iw-login-card {
  background: var(--iw-white); border-radius: var(--iw-radius);
  padding: 48px 40px; max-width: 420px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
}
.iw-login-card img { height: 60px; margin-bottom: 24px; }
.iw-login-card h1 { font-size: 1.5rem; margin-bottom: 8px; color: var(--iw-primary); }
.iw-login-card p { color: var(--iw-text-light); margin-bottom: 28px; font-size: 0.95rem; }
.iw-login-card input {
  width: 100%; padding: 14px 16px; border: 2px solid var(--iw-border);
  border-radius: var(--iw-radius); font-size: 1rem; font-family: inherit;
  margin-bottom: 16px;
}
.iw-login-card input:focus { outline: none; border-color: var(--iw-primary); }
.iw-login-error { color: var(--iw-error); font-size: 0.9rem; margin-bottom: 12px; display: none; }

/* ═══ BUTTONS ═══ */
.iw-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 14px 28px; border: none; border-radius: var(--iw-radius);
  font-size: 1rem; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
}
.iw-btn-primary { background: var(--iw-primary); color: white; }
.iw-btn-primary:hover { background: var(--iw-primary-dark); }
.iw-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.iw-btn-secondary { background: var(--iw-border); color: var(--iw-text); }
.iw-btn-secondary:hover { background: #dde2e6; }
.iw-btn-accent { background: var(--iw-accent); color: white; }
.iw-btn-accent:hover { background: var(--iw-accent-dark); }
.iw-btn-small { padding: 8px 16px; font-size: 0.85rem; border-radius: 8px; }
.iw-btn-flag { background: none; border: 2px solid var(--iw-border); color: var(--iw-text-light); }
.iw-btn-flag.flagged { border-color: var(--iw-accent); color: var(--iw-accent); background: rgba(245,147,33,0.1); }
.iw-btn-full { width: 100%; }

/* ═══ APP HEADER ═══ */
.iw-app-header {
  background: var(--iw-primary); color: white; padding: 12px 20px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.iw-app-header img { height: 32px; }
.iw-app-header h1 { font-size: 1.1rem; flex: 1; }
.iw-header-right { display: flex; align-items: center; gap: 10px; }
.iw-inspector-name { font-size: 0.85rem; opacity: 0.9; }

/* Sync indicator */
.iw-sync-indicator {
  width: 10px; height: 10px; border-radius: 50%;
  display: inline-block;
}
.iw-sync-indicator.online { background: #4caf50; }
.iw-sync-indicator.offline { background: #ff9800; }
.iw-sync-indicator.syncing { background: #2196f3; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Dark mode toggle */
.iw-dark-toggle {
  background: none; border: none; color: white; font-size: 1.2rem;
  cursor: pointer; padding: 4px;
}

/* Logout */
.iw-logout-btn {
  background: none; border: 1px solid rgba(255,255,255,0.3); color: white;
  padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer;
  font-family: inherit;
}

/* ═══ SCREENS ═══ */
.iw-screen { display: none; }
.iw-screen.active { display: block; }
.iw-screen-body { padding: 20px; max-width: 800px; margin: 0 auto; }

/* ═══ DASHBOARD ═══ */
.iw-dashboard-header { margin-bottom: 20px; }
.iw-dashboard-header h2 { font-size: 1.4rem; }
.iw-dashboard-header p { color: var(--iw-text-light); margin-top: 4px; }

.iw-inspection-card {
  background: var(--iw-card); border-radius: var(--iw-radius);
  padding: 20px; margin-bottom: 16px; box-shadow: var(--iw-shadow);
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  border: 2px solid transparent;
}
.iw-inspection-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.iw-inspection-card:active { transform: scale(0.98); }

.iw-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.iw-card-time { font-size: 0.85rem; color: var(--iw-text-light); font-weight: 500; }
.iw-card-address { font-size: 1.1rem; margin-bottom: 4px; }
.iw-card-client { font-size: 0.9rem; color: var(--iw-text-light); margin-bottom: 8px; }
.iw-card-services { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }

.iw-tag {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 600; background: rgba(21,81,109,0.1);
  color: var(--iw-primary); text-transform: capitalize;
}

.iw-card-progress { display: flex; align-items: center; gap: 8px; }
.iw-mini-progress { flex: 1; height: 6px; background: var(--iw-border); border-radius: 3px; overflow: hidden; }
.iw-mini-fill { height: 100%; background: var(--iw-success); border-radius: 3px; transition: width 0.3s; }
.iw-mini-text { font-size: 0.75rem; color: var(--iw-text-light); white-space: nowrap; }

.iw-status-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 600; color: white; text-transform: capitalize;
}

.iw-empty-state { text-align: center; padding: 60px 20px; color: var(--iw-text-light); }
.iw-empty-icon { font-size: 3rem; margin-bottom: 16px; }
.iw-loading { text-align: center; padding: 40px; color: var(--iw-text-light); }

/* ═══ DETAIL SCREEN ═══ */
.iw-detail-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.iw-detail-header h2 { font-size: 1.3rem; }
.iw-detail-info { background: var(--iw-card); border-radius: var(--iw-radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--iw-shadow); }
.iw-info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--iw-border); align-items: center; gap: 12px; }
.iw-info-row:last-child { border-bottom: none; }
.iw-info-label { font-weight: 600; font-size: 0.9rem; color: var(--iw-text-light); min-width: 80px; }
.iw-detail-actions { text-align: center; }

/* ═══ AGREEMENT SCREEN ═══ */
.iw-agreement-state { color: var(--iw-text-light); margin-bottom: 16px; font-size: 0.9rem; }
.iw-agreement-text {
  background: var(--iw-card); border-radius: var(--iw-radius);
  padding: 20px; margin-bottom: 24px; font-size: 0.9rem;
  line-height: 1.6; max-height: 300px; overflow-y: auto;
  border: 1px solid var(--iw-border);
}
.iw-signature-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.iw-sig-block { text-align: center; }
.iw-sig-block label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
.iw-sig-canvas {
  border: 2px dashed var(--iw-border); border-radius: 8px; background: white;
  cursor: crosshair; touch-action: none; width: 100%; max-width: 320px; height: 150px;
}

/* ═══ SECTION WIZARD ═══ */
.iw-section-topbar {
  background: var(--iw-card); padding: 12px 20px; border-bottom: 1px solid var(--iw-border);
  display: flex; align-items: center; gap: 12px;
}
.iw-drawer-toggle {
  background: none; border: none; font-size: 1.4rem; cursor: pointer;
  color: var(--iw-text); padding: 4px;
}
.iw-progress-track { flex: 1; height: 8px; background: var(--iw-border); border-radius: 4px; overflow: hidden; }
.iw-progress-fill { height: 100%; background: var(--iw-success); border-radius: 4px; transition: width 0.3s; }
#iwProgressText { font-size: 0.8rem; color: var(--iw-text-light); white-space: nowrap; }

.iw-section-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  padding-bottom: 16px; border-bottom: 2px solid var(--iw-border);
}
.iw-section-icon { font-size: 1.8rem; }
.iw-section-title { font-size: 1.3rem; }
.iw-section-group { font-size: 0.85rem; color: var(--iw-text-light); }

/* Checklist items */
.iw-checklist { margin-bottom: 24px; }
.iw-checklist-item {
  background: var(--iw-card); border-radius: 10px; padding: 16px;
  margin-bottom: 12px; box-shadow: var(--iw-shadow);
}
.iw-item-label { display: block; font-weight: 600; font-size: 0.95rem; margin-bottom: 10px; }
.iw-required { color: var(--iw-error); }
.iw-compliance-badge { font-size: 0.8rem; cursor: help; }

/* Condition buttons */
.iw-condition-btns { display: flex; flex-wrap: wrap; gap: 6px; }
.iw-cond-btn {
  padding: 8px 12px; border: 2px solid var(--iw-border); border-radius: 8px;
  background: var(--iw-card); font-size: 0.8rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
  color: var(--iw-text);
}
.iw-cond-btn:hover { border-color: var(--iw-primary); }
.iw-cond-btn.active { color: white; }
.iw-cond-satisfactory.active { background: var(--iw-success); border-color: var(--iw-success); }
.iw-cond-minor-defect.active { background: var(--iw-warning); border-color: var(--iw-warning); }
.iw-cond-major-defect.active { background: var(--iw-error); border-color: var(--iw-error); }
.iw-cond-not-inspected.active { background: var(--iw-text-light); border-color: var(--iw-text-light); }
.iw-cond-not-present.active { background: #95a5a6; border-color: #95a5a6; }

/* Item defect comment */
.iw-item-comment {
  width: 100%; margin-top: 8px; padding: 10px; border: 2px solid var(--iw-border);
  border-radius: 8px; font-family: inherit; font-size: 0.9rem; resize: vertical;
  min-height: 60px;
}
.iw-item-comment.hidden { display: none; }
.iw-item-comment.iw-warning { border-color: var(--iw-warning); background: rgba(245,147,33,0.05); }

/* Select / Input */
.iw-select, .iw-input {
  width: 100%; padding: 10px 14px; border: 2px solid var(--iw-border);
  border-radius: 8px; font-family: inherit; font-size: 0.95rem;
  background: var(--iw-card); color: var(--iw-text);
}
.iw-select:focus, .iw-input:focus { outline: none; border-color: var(--iw-primary); }

/* Comment area */
.iw-comment-area { margin-bottom: 20px; }
.iw-comment-area label { display: block; font-weight: 600; margin-bottom: 8px; }
.iw-comment-row { display: flex; gap: 8px; align-items: flex-start; }
.iw-textarea {
  flex: 1; padding: 12px; border: 2px solid var(--iw-border); border-radius: 8px;
  font-family: inherit; font-size: 0.95rem; resize: vertical; min-height: 80px;
  background: var(--iw-card); color: var(--iw-text);
}
.iw-textarea:focus { outline: none; border-color: var(--iw-primary); }
.iw-textarea.iw-warning { border-color: var(--iw-warning); background: rgba(245,147,33,0.05); }

/* Voice button */
.iw-voice-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid var(--iw-border); background: var(--iw-card);
  font-size: 1.2rem; cursor: pointer; flex-shrink: 0;
  transition: all 0.2s;
}
.iw-voice-btn.listening { border-color: var(--iw-error); background: rgba(192,57,43,0.1); animation: pulse 1s infinite; }

/* Photo area */
.iw-photo-area { margin-bottom: 24px; }
.iw-photo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.iw-photo-header label { font-weight: 600; }
.iw-photo-actions { display: flex; gap: 8px; }
.iw-photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
.iw-photo-thumb {
  position: relative; border-radius: 8px; overflow: hidden;
  background: var(--iw-border); aspect-ratio: 1;
}
.iw-photo-thumb img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
.iw-photo-delete {
  position: absolute; top: 4px; right: 4px; width: 24px; height: 24px;
  border-radius: 50%; background: rgba(0,0,0,0.6); color: white;
  border: none; cursor: pointer; font-size: 1rem; line-height: 1;
}
.iw-photo-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 6px 8px; border: none; background: rgba(0,0,0,0.6);
  color: white; font-size: 0.75rem; font-family: inherit;
}
.iw-photo-caption::placeholder { color: rgba(255,255,255,0.7); }

/* Fullscreen photo overlay */
.iw-photo-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9); z-index: 1000;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.iw-photo-overlay.active { display: flex; }
.iw-photo-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; }

/* Section actions */
.iw-section-actions {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
}
.iw-section-actions .iw-btn { flex: 1; min-width: 120px; }

/* Section navigation */
.iw-section-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 16px; border-top: 2px solid var(--iw-border);
}
.iw-section-counter { font-size: 0.9rem; color: var(--iw-text-light); font-weight: 600; }

/* ═══ SECTION DRAWER ═══ */
.iw-section-drawer {
  position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
  background: var(--iw-card); box-shadow: 4px 0 20px rgba(0,0,0,0.15);
  z-index: 200; transition: left 0.3s; overflow-y: auto;
  padding-bottom: 40px;
}
.iw-section-drawer.open { left: 0; }
.iw-drawer-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; border-bottom: 1px solid var(--iw-border);
  position: sticky; top: 0; background: var(--iw-card); z-index: 1;
}
.iw-drawer-header h3 { font-size: 1.1rem; }
#iwCloseDrawer { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--iw-text); }

.iw-drawer-group { padding: 12px 20px; }
.iw-drawer-group h4 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--iw-text-light); margin-bottom: 8px; }
.iw-drawer-item {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 12px; border: none; border-radius: 8px;
  background: none; font-family: inherit; font-size: 0.85rem;
  cursor: pointer; text-align: left; color: var(--iw-text);
  margin-bottom: 2px; transition: background 0.15s;
}
.iw-drawer-item:hover { background: var(--iw-bg); }
.iw-drawer-item.active { background: rgba(21,81,109,0.1); font-weight: 600; }
.iw-drawer-status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--iw-border);
}
.iw-drawer-item.completed .iw-drawer-status-dot { background: var(--iw-success); }
.iw-drawer-item.in_progress .iw-drawer-status-dot { background: var(--iw-primary); }
.iw-drawer-item.skipped .iw-drawer-status-dot { background: var(--iw-text-light); }
.iw-flag-icon { color: var(--iw-accent); font-size: 0.8rem; }

/* Drawer backdrop */
.iw-drawer-backdrop {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); z-index: 199;
  display: none;
}
.iw-section-drawer.open ~ .iw-drawer-backdrop { display: block; }

/* ═══ REVIEW SCREEN ═══ */
.iw-review-progress { margin-bottom: 24px; text-align: center; }
.iw-review-progress p { margin-top: 8px; font-size: 0.9rem; color: var(--iw-text-light); }
.iw-review-group { margin-bottom: 20px; }
.iw-review-group h3 { font-size: 1rem; color: var(--iw-text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.iw-review-item {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  background: var(--iw-card); border-radius: 8px; margin-bottom: 6px;
  box-shadow: var(--iw-shadow);
}
.iw-review-icon { font-size: 1.1rem; }
.iw-review-name { flex: 1; font-weight: 500; }
.iw-review-status { font-size: 0.8rem; color: var(--iw-text-light); }
.iw-review-warning {
  background: rgba(245,147,33,0.1); border: 1px solid var(--iw-warning);
  border-radius: 8px; padding: 12px 16px; margin: 16px 0; font-size: 0.9rem;
}
.iw-review-actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 640px) {
  .iw-login-card { padding: 32px 24px; }
  .iw-app-header h1 { font-size: 0.95rem; }
  .iw-inspector-name { display: none; }
  .iw-screen-body { padding: 16px; }
  .iw-signature-section { grid-template-columns: 1fr; }
  .iw-condition-btns { gap: 4px; }
  .iw-cond-btn { padding: 6px 8px; font-size: 0.7rem; }
  .iw-section-actions { flex-direction: column; }
  .iw-section-actions .iw-btn { min-width: auto; }
  .iw-photo-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
}

@media (max-width: 380px) {
  .iw-cond-btn { padding: 5px 6px; font-size: 0.65rem; }
}

/* ═══ UTILITIES ═══ */
.hidden { display: none !important; }

/* ═══ DEMO MODE ═══ */
body.iw-demo-mode .iw-app-header { top: 40px; }
body.iw-demo-mode .iw-screen-body { padding-top: 24px; }
@media (max-width: 600px) {
  body.iw-demo-mode #iwDemoBanner { font-size: 12px; padding: 6px 10px; }
  body.iw-demo-mode { padding-top: 34px !important; }
  body.iw-demo-mode .iw-app-header { top: 34px; }
}

/* ═══ VALIDATION ERROR HIGHLIGHT ═══ */
@keyframes iw-error-pulse {
  0% { box-shadow: 0 0 0 0 rgba(192,57,43,0.5); }
  50% { box-shadow: 0 0 0 6px rgba(192,57,43,0.2); }
  100% { box-shadow: 0 0 0 0 rgba(192,57,43,0); }
}
.iw-validation-error {
  border-color: var(--iw-error) !important;
  animation: iw-error-pulse 0.6s ease 3;
}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div class="iw-login-screen" id="loginScreen">
  <div class="iw-login-card">
    <img src="/images/HIG_Logo.avif" alt="Heartland Inspection Group" onerror="this.src='/images/HIG_Logo.png'">
    <h1>Inspector Portal</h1>
    <p>Sign in with your inspector email</p>
    <div class="iw-login-error" id="iwLoginError"></div>
    <input type="email" id="iwEmail" placeholder="inspector@email.com" autocomplete="email" inputmode="email">
    <button class="iw-btn iw-btn-primary iw-btn-full" id="iwLoginBtn">Sign In</button>
  </div>
</div>

<!-- ═══ INSPECTOR APP ═══ -->
<div id="iwInspectorApp" style="display:none;">

  <!-- Header -->
  <header class="iw-app-header">
    <img src="/images/HIG_Logo.avif" alt="HIG" onerror="this.src='/images/HIG_Logo.png'" style="height:28px;filter:brightness(10);">
    <h1>Inspector</h1>
    <div class="iw-header-right">
      <span class="iw-inspector-name" id="iwInspectorName"></span>
      <span class="iw-sync-indicator online" id="syncIndicator" title="Online"></span>
      <button class="iw-dark-toggle" id="iwDarkToggle" title="Toggle dark mode">🌙</button>
      <button class="iw-logout-btn" id="iwLogoutBtn">Logout</button>
    </div>
  </header>

  <!-- Dashboard Screen -->
  <div class="iw-screen active" id="screenDashboard">
    <div class="iw-screen-body">

<script>
/* Register service worker for PWA */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function(err) {
    console.warn('SW registration failed:', err);
  });
}

/* Set dashboard date */
var dateEl = document.getElementById('iwDashboardDate');
if (dateEl) {
  dateEl.textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

/* Drawer backdrop close */
var backdrop = document.getElementById('iwDrawerBackdrop');
if (backdrop) {
  backdrop.addEventListener('click', function() {
    document.getElementById('iwSectionDrawer').classList.remove('open');
  });
}
</script>
